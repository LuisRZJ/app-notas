<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.0.2">
    <title>Estadísticas del Diario</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./logo-app.png">
    <link rel="icon" type="image/png" href="./logo-app.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body class="bg-slate-100 text-slate-800" data-page="stats" data-theme="light">

    <div id="loading-screen-component"></div>

    <div class="container mx-auto p-4 md:p-8 max-w-5xl pb-24">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-slate-900">Estadísticas del Diario</h1>
            <p class="text-slate-500 mt-3 max-w-2xl mx-auto text-base md:text-lg">
                Visualiza un resumen de tu actividad, tus hábitos de escritura y la distribución de etiquetas en tus notas guardadas en IndexedDB.
            </p>
        </header>

        <!-- Componentes dinámicos -->
        <div id="stats-overview-component"></div>
        <div id="stats-distribution-component"></div>
        <div id="stats-timeline-component"></div>
    </div>

    <!-- Navegación compartida -->
    <div id="navigation-component"></div>

    <!-- Scripts -->
    <script>
        (function(){
            const meta = document.querySelector('meta[name="app-version"]');
            window.APP_VERSION = (meta && meta.content) ? meta.content : String(Date.now());
        })();
    </script>
    <script src="./js/core/components-loader.js"></script>
    <script src="./js/core/pwa.js"></script>
    <script src="./js/core/github-sync.js"></script>
    <script src="./js/app.js"></script>
    <script src="./app.js"></script>
    <script src="./js/estadistica.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ComponentLoader.loadComponents();
        });
    </script>
</body>
</html>
