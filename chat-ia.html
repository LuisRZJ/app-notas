<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.0.2">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./logo-app.png">
    <link rel="icon" type="image/png" href="./logo-app.png">
    <title>Chat IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js para parsear Markdown en las respuestas de la IA -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body class="bg-orange-50 text-gray-800 h-screen overflow-hidden" data-page="chat" data-theme="light">

    <!-- Contenedores de componentes de las pantallas -->
    <div id="chat-home-component" class="contents"></div>
    <div id="chat-settings-component" class="contents"></div>
    <div id="chat-chat-component" class="contents"></div>
    <div id="chat-modal-component" class="contents"></div>

    <script>
        // Exponer la versión de la app para versionar recursos dinámicos
        (function(){
            const meta = document.querySelector('meta[name="app-version"]');
            window.APP_VERSION = (meta && meta.content) ? meta.content : String(Date.now());
        })();
    </script>
    <script src="./js/core/components-loader.js"></script>
    <script src="./js/core/pwa.js"></script>
    <script src="./js/core/github-sync.js"></script>
    <script src="./js/app.js"></script>
    <script src="./app.js"></script>
    <script src="./js/chat-ia.js"></script>
</body>
</html>
