<div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
    <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
        <!-- GitHub icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
            class="text-slate-800">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Sincronización con GitHub
    </h2>

    <div class="space-y-5">
        <p class="text-slate-600 text-sm">Conecta la app con tu repositorio privado en GitHub para respaldar
            y restaurar todos tus datos de forma segura.</p>

        <!-- Configuración del API Secret -->
        <div class="p-4 bg-slate-50 rounded-xl border border-slate-200">
            <h3 class="font-semibold text-slate-700 mb-3 text-sm uppercase tracking-wider">Configuración</h3>
            <div>
                <label for="api-secret-input" class="block text-sm font-medium text-slate-600 mb-1">API
                    Secret</label>
                <input id="api-secret-input" type="password" placeholder="Pega tu API Secret aquí"
                    class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-slate-400 mt-1">Solo necesitas introducirlo una vez. Se guarda
                    localmente en tu dispositivo.</p>
            </div>
            <div class="mt-3">
                <button id="save-api-secret-btn"
                    class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition-all text-sm">
                    Guardar Secreto
                </button>
            </div>
        </div>

        <!-- Acciones de sincronización -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <button id="backup-now-btn"
                class="flex items-center justify-center gap-2 bg-slate-800 text-white font-semibold py-2.5 px-4 rounded-lg hover:bg-slate-900 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 16 12 12 8 16" />
                    <line x1="12" x2="12" y1="12" y2="21" />
                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                </svg>
                Respaldar ahora
            </button>
            <button id="restore-from-cloud-btn"
                class="flex items-center justify-center gap-2 border border-slate-300 text-slate-700 font-semibold py-2.5 px-4 rounded-lg hover:bg-slate-50 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="8 16 12 20 16 16" />
                    <line x1="12" x2="12" y1="20" y2="11" />
                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                </svg>
                Restaurar desde la nube
            </button>
        </div>

        <!-- Estado y última sincronización -->
        <div class="space-y-1">
            <p id="sync-status" class="text-sm hidden"></p>
            <p id="last-sync-display" class="text-xs text-slate-400"></p>
        </div>
    </div>
</div>
