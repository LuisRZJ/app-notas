<div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
    <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="text-blue-600">
            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
        </svg>
        Sincronización en la Nube (Supabase)
    </h2>
    <div id="supabase-auth-container">
        <!-- Estado: No autenticado -->
        <div id="supabase-logged-out" class="space-y-4">
            <p class="text-slate-600 text-sm">Inicia sesión para respaldar tus notas y sincronizarlas entre
                dispositivos automáticamente.</p>
            <div class="space-y-3">
                <div>
                    <label for="supabase-email" class="block text-sm font-medium text-slate-600 mb-1">Correo
                        Electrónico</label>
                    <input id="supabase-email" type="email" placeholder="tu@email.com"
                        class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="supabase-password"
                        class="block text-sm font-medium text-slate-600 mb-1">Contraseña</label>
                    <input id="supabase-password" type="password" placeholder="••••••••"
                        class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex flex-wrap gap-3">
                    <button id="supabase-login-btn"
                        class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition-all flex items-center gap-2">
                        Iniciar Sesión
                    </button>
                    <button id="supabase-signup-btn"
                        class="bg-slate-100 text-slate-700 font-semibold py-2 px-4 rounded-lg hover:bg-slate-200 transition-all">
                        Registrarse
                    </button>
                </div>
            </div>
        </div>

        <!-- Estado: Autenticado -->
        <div id="supabase-logged-in" class="hidden space-y-4">
            <div class="flex items-center justify-between p-4 bg-blue-50 rounded-xl border border-blue-100">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs text-blue-600 font-semibold uppercase tracking-wider">Sesión Activa
                        </p>
                        <p id="supabase-user-email" class="text-slate-800 font-medium font-mono text-sm">
                            usuario@ejemplo.com</p>
                    </div>
                </div>
                <button id="supabase-logout-btn" class="text-slate-500 hover:text-red-600 p-2 transition-colors"
                    title="Cerrar Sesión">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" x2="9" y1="12" y2="12" />
                    </svg>
                </button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <button id="supabase-sync-now-btn"
                    class="flex items-center justify-center gap-2 bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="lucide-refresh-cw">
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                        <path d="M21 3v5h-5" />
                        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                        <path d="M8 16H3v5" />
                    </svg>
                    Sincronizar Ahora
                </button>
                <div
                    class="flex items-center gap-2 text-xs text-slate-500 bg-slate-50 p-2 rounded-lg border border-slate-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                    <span>Respaldo automático activado</span>
                </div>
            </div>
        </div>

        <p id="supabase-status" class="mt-3 text-sm hidden"></p>
    </div>
</div>
