<div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
    <h2 class="text-2xl font-semibold mb-4">Integraciones</h2>
    <div class="space-y-4">
        <div>
            <label for="discord-webhook-input" class="block text-sm font-medium text-slate-600 mb-1">Discord
                Webhook URL</label>
            <input id="discord-webhook-input" type="password" placeholder="https://discord.com/api/webhooks/..."
                class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex flex-wrap gap-3">
            <button id="save-webhook-btn"
                class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition-transform transform hover:scale-[1.02]">Guardar
                Webhook</button>
            <button id="clear-webhook-btn"
                class="bg-slate-200 text-slate-800 font-semibold py-2 px-4 rounded-lg hover:bg-slate-300 transition-transform transform hover:scale-[1.02]">Borrar
                Webhook</button>
        </div>
        <p id="webhook-status" class="text-sm text-slate-500"></p>
        <p class="text-xs text-slate-400 mt-2">
            <strong class="font-medium text-slate-600">Nota de Seguridad:</strong> La URL se guarda localmente
            en tu navegador. Úsala solo en dispositivos de confianza.
        </p>
    </div>
</div>
