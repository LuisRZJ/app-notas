<div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
    <h2 class="text-2xl font-semibold mb-4">Estadísticas de Uso</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
            <div class="flex items-center gap-2 mb-2 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-timer">
                    <line x1="10" x2="14" y1="2" y2="2" />
                    <line x1="12" x2="15" y1="14" y2="11" />
                    <circle cx="12" cy="14" r="8" />
                </svg>
                <span class="font-semibold text-sm uppercase tracking-wide">Tiempo Total</span>
            </div>
            <p id="total-session-time" class="text-2xl font-bold text-slate-900">--</p>
            <p class="text-xs text-slate-500 mt-1">Acumulado en todas las sesiones.</p>
        </div>
        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
            <div class="flex items-center gap-2 mb-2 text-purple-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-clock">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span class="font-semibold text-sm uppercase tracking-wide">Tiempo Medio</span>
            </div>
            <p id="average-session-time" class="text-2xl font-bold text-slate-900">--</p>
            <p class="text-xs text-slate-500 mt-1">Promedio por sesión.</p>
        </div>
    </div>
</div>
