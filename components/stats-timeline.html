<section aria-labelledby="timeline-heading" class="mb-[6rem]">
    <div class="flex items-center gap-3 mb-6">
        <h2 id="timeline-heading" class="text-2xl font-semibold text-slate-900">Cronología y Consistencia</h2>
        <span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-0.5 rounded-full dark:bg-indigo-900 dark:text-indigo-300">Análisis Temporal</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-[1.5fr_1fr] gap-8">
        <article aria-labelledby="monthly-comparison-heading" class="detail-card p-6 flex flex-col h-full">
            <h3 id="monthly-comparison-heading" class="text-lg font-bold text-slate-800 mb-2">Evolución Anual</h3>
            <p class="text-sm text-slate-500 mb-6">Comparativa de notas creadas por mes entre el año actual y el anterior.</p>
            <div id="monthly-comparison-message" class="text-sm font-medium mb-4 rounded-lg hidden aria-hidden='true'"></div>
            <div class="relative w-full h-[300px] flex-grow">
                <canvas id="monthly-comparison-chart" aria-label="Gráfico de barras de evolución anual"></canvas>
            </div>
        </article>

        <article aria-labelledby="notes-heatmap-heading" class="detail-card p-6 flex flex-col h-full">
            <div class="flex items-center justify-between mb-2">
                <h3 id="notes-heatmap-heading" class="text-lg font-bold text-slate-800">Mapa de Calor</h3>
                <div class="flex gap-2">
                    <button id="notes-heatmap-prev" aria-label="Mes anterior" class="p-1.5 rounded-md hover:bg-slate-100 text-slate-500 transition-colors dark:hover:bg-slate-700 dark:text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <span id="notes-heatmap-month-label" class="text-sm font-semibold text-slate-700 min-w-[120px] text-center dark:text-slate-300">--</span>
                    <button id="notes-heatmap-next" aria-label="Mes siguiente" class="p-1.5 rounded-md hover:bg-slate-100 text-slate-500 transition-colors dark:hover:bg-slate-700 dark:text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>
            </div>
            <p class="text-sm text-slate-500 mb-6">Registro de consistencia diaria en el mes seleccionado.</p>

            <div id="notes-heatmap-message" class="text-sm font-medium mb-4 rounded-lg hidden aria-hidden='true'"></div>
            <div class="w-full flex-grow flex flex-col justify-center">
                <div id="notes-heatmap-weekdays" class="grid grid-cols-7 gap-2 mb-2 text-center text-xs font-medium text-slate-500 max-w-sm mx-auto w-full dark:text-slate-400"></div>
                <!-- Días de la semana insertados por JS -->
                <div id="notes-heatmap-grid" class="grid grid-cols-7 gap-2 max-w-sm mx-auto w-full" role="grid" aria-label="Calendario de contribuciones">
                    <!-- Celdas insertadas por JS -->
                </div>
                <div class="mt-6 flex items-center justify-center gap-3 text-xs text-slate-500 dark:text-slate-400" id="notes-heatmap-legend">
                    <span>Menos</span>
                    <div class="flex gap-1.5">
                        <div class="w-4 h-4 rounded-sm bg-slate-100 dark:bg-blue-900/40"></div>
                        <div class="w-4 h-4 rounded-sm bg-blue-200 dark:bg-blue-800/60"></div>
                        <div class="w-4 h-4 rounded-sm bg-blue-400 dark:bg-blue-600/80"></div>
                        <div class="w-4 h-4 rounded-sm bg-blue-600 dark:bg-blue-500"></div>
                    </div>
                    <span>Más</span>
                </div>
            </div>
        </article>
    </div>
</section>
