<div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
    <h2 class="text-2xl font-semibold mb-4">Perfil</h2>
    <div class="space-y-4">
        <div>
            <label for="user-name-input" class="block text-sm font-medium text-slate-600 mb-1">Nombre del
                usuario</label>
            <input id="user-name-input" type="text" placeholder="Escribe tu nombre" autocomplete="name"
                class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex flex-wrap gap-3">
            <button id="save-user-name-btn"
                class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 transition-transform transform hover:scale-[1.02]">Guardar
                Nombre</button>
            <button id="clear-user-name-btn"
                class="bg-slate-200 text-slate-800 font-semibold py-2 px-4 rounded-lg hover:bg-slate-300 transition-transform transform hover:scale-[1.02]">Borrar
                Nombre</button>
        </div>
        <p id="user-name-status" class="text-sm text-slate-500"></p>
    </div>
</div>
