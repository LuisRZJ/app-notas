<section aria-labelledby="activity-heading" class="mb-12">
    <div class="flex items-center gap-3 mb-6">
        <h2 id="activity-heading" class="text-2xl font-semibold text-slate-900">Actividad detallada</h2>
        <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-0.5 rounded-full dark:bg-blue-900 dark:text-blue-300">Reciente</span>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <article aria-labelledby="recent-notes-heading" class="detail-card p-6 flex flex-col h-full relative">
            <h3 id="recent-notes-heading" class="text-lg font-bold text-slate-800 mb-5 flex items-center justify-between">
                Línea de tiempo de notas
                <span id="notes-total-indicator" class="text-xs font-semibold bg-slate-100 text-slate-500 px-2 py-1 rounded">0</span>
            </h3>
            <div id="notes-list" class="space-y-4 overflow-y-auto pr-2 custom-scrollbar flex-grow" style="max-height: 400px;" role="list">
                <!-- Se inyectan las notas dinámicamente -->
            </div>
            <div id="notes-list-empty" class="text-center text-slate-500 py-8 hidden" role="status">
                Todavía no has creado ninguna nota en tu diario.
            </div>
            <div class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-white to-transparent dark:from-slate-800 pointer-events-none rounded-b-xl"></div>
        </article>

        <article aria-labelledby="tags-distribution-heading" class="detail-card p-6 flex flex-col h-full relative">
            <h3 id="tags-distribution-heading" class="text-lg font-bold text-slate-800 mb-5 flex items-center justify-between">
                Distribución de etiquetas
                <span id="tags-total-indicator" class="text-xs font-semibold bg-slate-100 text-slate-500 px-2 py-1 rounded">0</span>
            </h3>
            <div id="tag-frequency-list" class="space-y-4 overflow-y-auto pr-2 custom-scrollbar flex-grow" style="max-height: 400px;" role="list">
                <!-- Se inyectan las frecuencias dinámicamente -->
            </div>
            <div id="tag-frequency-empty" class="text-center text-slate-500 py-8 hidden" role="status">
                Tus notas aún no tienen etiquetas asociadas.
            </div>
            <div class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-white to-transparent dark:from-slate-800 pointer-events-none rounded-b-xl"></div>
        </article>
    </div>
</section>

<!-- Variables y Plantillas (Templates) -->
<template id="note-summary-template">
    <div class="note-summary p-4 bg-slate-50 rounded-xl border border-slate-100 hover:border-blue-200 transition-colors" role="listitem">
        <div class="flex justify-between items-start mb-2">
            <h4 class="font-semibold text-slate-800 line-clamp-1" data-note-title></h4>
            <span class="text-xs text-slate-500 whitespace-nowrap ml-4" data-note-date></span>
        </div>
        <div class="flex items-center gap-4 text-xs text-slate-500">
            <span class="flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
                <span data-note-word-count></span>
            </span>
            <div class="flex flex-wrap gap-1.5" data-note-tags></div>
        </div>
    </div>
</template>

<template id="note-tag-template">
    <span class="text-xs font-semibold tag-pill px-3 py-1" data-tag-name></span>
</template>

<template id="tag-frequency-template">
    <div class="tag-frequency-item group" role="listitem">
        <div class="flex justify-between text-sm mb-1.5">
            <span class="font-medium text-slate-700 group-hover:text-blue-600 transition-colors" data-tag-frequency-name></span>
            <span class="text-slate-500 font-medium whitespace-nowrap"><span data-tag-frequency-count></span> (<span data-tag-frequency-percentage></span>)</span>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
            <div class="bg-blue-500 h-2 rounded-full transition-all duration-500 ease-out" data-tag-frequency-bar style="width: 0%"></div>
        </div>
    </div>
</template>
