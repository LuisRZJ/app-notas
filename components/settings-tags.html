<div class="bg-white p-6 rounded-2xl shadow-lg mb-6">
    <h2 class="text-2xl font-semibold mb-4">Gestionar Etiquetas</h2>
    <div class="flex gap-2 mb-4">
        <input id="new-tag-input" type="text" placeholder="Nombre de la nueva etiqueta"
            class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
        <div id="new-tag-color-wrapper" class="color-picker-wrapper" style="background-color: #3b82f6;">
            <input id="new-tag-color" type="color" value="#3b82f6" title="Elegir color para la etiqueta">
        </div>
        <button id="add-tag-btn"
            class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 flex-shrink-0">Añadir</button>
    </div>
    <div id="tags-list" class="space-y-2"></div>
</div>
