<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./logo-app.png">
    <link rel="icon" type="image/png" href="./logo-app.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/estilos.css">
    <meta name="app-version" content="1.0.2">
</head>

<body class="bg-slate-100 text-slate-800" data-page="settings" data-theme="light">

    <!-- Contenedor para la pantalla de carga -->
    <div id="loading-screen-component"></div>

    <div class="container mx-auto p-4 md:p-8 max-w-4xl pb-24">
        
        <div id="settings-header-component"></div>
        <div id="settings-theme-component"></div>
        <div id="settings-profile-component"></div>
        <div id="settings-birthday-component"></div>
        <div id="settings-tags-component"></div>
        <div id="settings-storage-component"></div>
        <div id="settings-sync-component"></div>
        <div id="settings-stats-component"></div>
        <div id="settings-integrations-component"></div>
        <div id="settings-data-actions-component"></div>

    </div>

    <div id="navigation-component"></div>

    <div id="confirmation-modals-component"></div>

    <script>
        // Exponer la versión de la app para versionar recursos dinámicos
        (function(){
            const meta = document.querySelector('meta[name="app-version"]');
            window.APP_VERSION = (meta && meta.content) ? meta.content : String(Date.now());
        })();
    </script>
    <script src="./js/core/components-loader.js"></script>
    <script src="./js/core/pwa.js"></script>
    <script src="./js/app.js"></script>
    <script src="./app.js"></script>
</body>

</html>
